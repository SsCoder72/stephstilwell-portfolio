<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        .calculator-container {
            width: 600px;
            height: 500px;
            background-color: gray;
            overflow: hidden;
            border-radius: 10px;
        }

        #screen {
            display: block;
            margin: auto;
            margin-top: 50px;
            width: 500px;
            height: 100px;
            box-sizing: border-box;
            background-color: white;
            border-radius: 5px;
            text-align: right;
            font-size: 25px;
            font-family: courier;
            padding-right: 10px;
            line-height: 100px
        }

        .calculator-buttons {
            margin: auto;
            width: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 10px;
            gap: 5px;
        }

        .calculator-buttons button {
            width: 100%;
            height: 50px;
        }

        button {
            font-family: courier;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="calculator-container">
        <div class="calculator-display">
            <div id="screen"></div>
        </div>
        <div class="calculator-buttons">

            <button>CE</button>
            <button>ON/C</button>
            <button></button>
            <button></button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>/</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>*</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>
            <button>0</button>
            <button>.</button>
            <button>=</button>
            <button>+</button>

        </div>
    </div>


    <script>
        const screen = document.getElementById("screen")
        const buttons = document.querySelectorAll("button")

        buttons.forEach(function (button) {
            button.addEventListener("click", function () {
                if (button.innerText === "=") {
                    if (screen.innerText !== "") {
                        screen.innerText = eval(screen.innerText);
                    }
                } else if (button.innerText === "ON/C") {
                    screen.innerText = "";
                } else if (button.innerText === "CE") {
                    screen.innerText = "";
                } else {
                    screen.innerText = screen.innerText + button.innerText;
                }
            });

        });

    </script>


</body>

</html>
